spec_version: 1

name: nl_sql_analytics_env

environment:
  module: server.nl_sql_analytics_env_environment
  class: NlSqlAnalyticsEnvironment

tasks:
  - name: nl_sql_query
    description: Generate SQL query from natural language
    grader: graders.nl_sql_query_grader.grade

  - name: customer_lookup
    description: Lookup customers using filters
    grader: graders.customer_lookup_grader.grade

  - name: sales_summary
    description: Generate aggregated sales queries
    grader: graders.sales_summary_grader.grade

action:
  type: object
  properties:
    sql_query:
      type: string
  required:
    - sql_query

observation:
  type: object
  properties:
    result:
      type: string
      nullable: true

    correct:
      type: boolean

    message:
      type: string

  required:
    - correct
    - message
